<!DOCTYPE html>
<html lang="da">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Google Anmeldelser</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    .reviews-widget {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
      background-color: #171717;
      padding: 24px;
      border-radius: 24px;
    }

    .widget-header {
      background-color: #262626;
      border-radius: 8px;
      padding: 24px;
      margin-bottom: 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 16px;
    }

    .rating-section {
      display: flex;
      align-items: center;
      gap: 16px;
    }

    .google-logo {
      width: 32px;
      height: 32px;
      flex-shrink: 0;
    }

    .overall-rating {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .rating-number {
      color: #FFFFFF;
      font-size: 32px;
      font-weight: bold;
      line-height: 1;
    }

    .rating-stars {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .stars {
      display: flex;
      gap: 2px;
    }

    .star {
      width: 20px;
      height: 20px;
    }

    .review-count {
      color: #9CA3AF;
      font-size: 14px;
    }

    .review-button {
      background-color: #000000;
      color: #FFFFFF;
      padding: 12px 24px;
      border-radius: 8px;
      font-weight: 500;
      font-size: 14px;
      border: none;
      cursor: pointer;
      transition: background-color 0.3s ease;
      white-space: nowrap;
    }

    .review-button:hover {
      background-color: #1a1a1a;
    }

    .loading {
      color: #a1a1a1;
      text-align: center;
      padding: 48px 24px;
      font-size: 16px;
    }

    .error {
      color: #EF4444;
      text-align: center;
      padding: 48px 24px;
      font-size: 16px;
    }

    .reviews-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 24px;
    }

    @media (max-width: 1024px) {
      .reviews-grid {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }
      .widget-header {
        flex-direction: column;
        align-items: flex-start;
      }
      .review-button {
        width: 100%;
      }
    }

    @media (max-width: 640px) {
      .reviews-grid {
        grid-template-columns: 1fr;
      }
    }

    .review-card {
      background-color: #262626;
      border-radius: 8px;
      padding: 24px;
      display: flex;
      flex-direction: column;
      gap: 16px;
      box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
      transition: box-shadow 0.3s ease;
      position: relative;
    }

    .review-card:hover {
      box-shadow: 0 10px 15px rgba(0, 0, 0, 0.2);
    }

    .google-icon {
      position: absolute;
      top: 16px;
      right: 16px;
      width: 24px;
      height: 24px;
      cursor: pointer;
      opacity: 1;
      transition: transform 0.2s ease;
    }

    .google-icon:hover {
      transform: scale(1.1);
    }

    .review-header {
      display: flex;
      align-items: flex-start;
      gap: 12px;
    }

    .avatar {
      width: 48px;
      height: 48px;
      border-radius: 50%;
      object-fit: cover;
      flex-shrink: 0;
    }

    .avatar-placeholder {
      width: 48px;
      height: 48px;
      border-radius: 50%;
      background-color: #374151;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .user-info {
      flex: 1;
      min-width: 0;
    }

    .user-name-row {
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .user-name {
      color: #FFFFFF;
      font-size: 16px;
      font-weight: 600;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .verified-badge {
      width: 16px;
      height: 16px;
      flex-shrink: 0;
    }

    .local-guide {
      color: #60A5FA;
      font-size: 12px;
      font-weight: 500;
      display: inline-block;
    }

    .review-count-user {
      color: #9CA3AF;
      font-size: 12px;
      margin-top: 2px;
    }

    .rating-date {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .date {
      color: #9CA3AF;
      font-size: 14px;
    }

    .review-text {
      color: #D1D5DB;
      font-size: 14px;
      line-height: 1.6;
    }

    .review-text.truncated {
      display: -webkit-box;
      -webkit-line-clamp: 4;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .show-more-btn {
      background: none;
      border: none;
      color: #60A5FA;
      font-size: 12px;
      font-weight: 500;
      cursor: pointer;
      margin-top: 8px;
      padding: 0;
      transition: color 0.3s ease;
    }

    .show-more-btn:hover {
      color: #93C5FD;
    }

    .review-images {
      display: flex;
      gap: 8px;
      overflow-x: auto;
    }

    .review-image {
      width: 80px;
      height: 80px;
      object-fit: cover;
      border-radius: 4px;
      flex-shrink: 0;
    }

    .likes {
      color: #9CA3AF;
      font-size: 12px;
    }

    /* Owner Response Styles */
    .owner-response {
      background-color: rgba(59, 130, 246, 0.1);
      border-left: 4px solid #3B82F6;
      border-radius: 4px;
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .owner-response-header {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .owner-response-icon {
      width: 16px;
      height: 16px;
      flex-shrink: 0;
    }

    .owner-response-title {
      color: #FFFFFF;
      font-size: 14px;
      font-weight: 600;
    }

    .owner-response-date {
      color: #9CA3AF;
      font-size: 12px;
    }

    .owner-response-text {
      color: #D1D5DB;
      font-size: 14px;
      line-height: 1.6;
      word-wrap: break-word;
      overflow-wrap: break-word;
    }

    .owner-response-text.truncated {
      display: -webkit-box;
      -webkit-line-clamp: 1;
      -webkit-box-orient: vertical;
      overflow: hidden;
      text-overflow: ellipsis;
    }
  </style>
</head>
<body>
  <div class="reviews-widget">
    <div id="widget-header" class="widget-header" style="display: none;">
      <div class="rating-section">
        <svg class="google-logo" viewBox="0 0 24 24" fill="none">
          <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
          <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
          <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/>
          <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
        </svg>
        <div class="overall-rating">
          <span class="rating-number" id="average-rating">0.0</span>
          <div class="rating-stars">
            <div class="stars" id="header-stars"></div>
            <span class="review-count" id="review-count">(0)</span>
          </div>
        </div>
      </div>
      <button class="review-button" onclick="openReviewPage()">Anmeld os på Google</button>
    </div>
    
    <div id="reviews-container">
      <div class="loading">Indlæser anmeldelser...</div>
    </div>
  </div>

  <script>
    (function() {
      var SUPABASE_URL = 'https://kzvdgdfxxkxeaihrqigd.supabase.co';
      var SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imt6dmRnZGZ4eGt4ZWFpaHJxaWdkIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjUwNDQwNzQsImV4cCI6MjA4MDYyMDA3NH0.ZOmXme0uhK5gi7MTEnzJgY1mHiRGQZIgrvGQ1-nTwsw';
      var PLACE_ID = 'ChIJq5JklwgFuQ0RREPIKUg0EHs';
      var MAX_REVIEWS = 4;
      
      var STORAGE_KEY = 'reviews_' + PLACE_ID;
      var EXPIRES_AT_KEY = 'expires_at_' + PLACE_ID;
      var RATING_KEY = 'rating_' + PLACE_ID;

      var expandedReviews = {};
      var expandedResponses = {};
      var refreshTimeout = null;

      function shouldFetchReviews() {
        var expiresAt = localStorage.getItem(EXPIRES_AT_KEY);
        if (!expiresAt) return true;
        var expirationDate = new Date(expiresAt);
        var now = new Date();
        return now >= expirationDate;
      }

      function renderStars(rating, size) {
        size = size || 16;
        var html = '';
        for (var i = 0; i < 5; i++) {
          if (i < rating) {
            html += '<svg class="star" width="' + size + '" height="' + size + '" fill="#FBBF24" viewBox="0 0 24 24"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/></svg>';
          } else {
            html += '<svg class="star" width="' + size + '" height="' + size + '" fill="#4B5563" viewBox="0 0 24 24"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/></svg>';
          }
        }
        return html;
      }

      function updateHeader(rating, reviewCount) {
        var header = document.getElementById('widget-header');
        var roundedRating = Math.round(parseFloat(rating));
        
        document.getElementById('average-rating').textContent = rating;
        document.getElementById('header-stars').innerHTML = renderStars(roundedRating, 20);
        document.getElementById('review-count').textContent = '(' + reviewCount + ')';
        
        header.style.display = 'flex';
      }

      function openReviewPage() {
        window.open('https://search.google.com/local/writereview?placeid=' + PLACE_ID, '_blank', 'noopener,noreferrer');
      }

      window.openReviewPage = openReviewPage;

      function escapeHtml(text) {
        var div = document.createElement('div');
        div.textContent = text;
        return div.innerHTML;
      }

      function renderReviews(reviews) {
        var displayReviews = reviews.slice(0, MAX_REVIEWS);
        var userIconSVG = '<svg fill="#9CA3AF" viewBox="0 0 24 24" style="width: 24px; height: 24px;"><circle cx="12" cy="8" r="4"/><path d="M12 14c-6 0-8 3-8 5v2h16v-2c0-2-2-5-8-5z"/></svg>';
        var googleIconSVG = '<svg viewBox="0 0 24 24" fill="none"><path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/><path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/><path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/><path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/></svg>';
        var verifiedBadgeSVG = '<svg viewBox="0 0 24 24" fill="#3B82F6"><path d="M9 16.17L4.83 12l-1.42 1.41L9 19 21 7l-1.41-1.41z"/></svg>';
        var messageIconSVG = '<svg class="owner-response-icon" viewBox="0 0 24 24" fill="none" stroke="#60A5FA" stroke-width="2"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"></path></svg>';

        var html = '<div class="reviews-grid">';

        for (var i = 0; i < displayReviews.length; i++) {
          var review = displayReviews[i];
          html += '<div class="review-card">';
          
          var reviewLink = review.link || '';
          html += '<div class="google-icon" data-review-link="' + reviewLink + '" title="Se på Google">' + googleIconSVG + '</div>';

          html += '<div class="review-header">';
          if (review.user.thumbnail) {
            html += '<img src="' + review.user.thumbnail + '" alt="' + escapeHtml(review.user.name) + '" class="avatar" />';
          } else {
            html += '<div class="avatar-placeholder">' + userIconSVG + '</div>';
          }

          html += '<div class="user-info">';
          html += '<div class="user-name-row">';
          html += '<h3 class="user-name">' + escapeHtml(review.user.name) + '</h3>';
          html += '<span class="verified-badge" title="Verificeret">' + verifiedBadgeSVG + '</span>';
          html += '</div>';

          if (review.user.local_guide) {
            html += '<span class="local-guide">Lokal Guide</span>';
          }

          if (review.user.reviews) {
            html += '<p class="review-count-user">' + review.user.reviews + ' anmeldelser</p>';
          }

          html += '</div></div>';

          html += '<div class="rating-date">';
          html += '<div class="stars">' + renderStars(review.rating) + '</div>';
          html += '<span class="date">' + escapeHtml(review.date) + '</span>';
          html += '</div>';

          html += '<div>';
          html += '<p class="review-text' + (review.snippet.length > 200 ? ' truncated' : '') + '" id="review-text-' + i + '">' + escapeHtml(review.snippet) + '</p>';
          
          if (review.snippet.length > 200) {
            html += '<button class="show-more-btn" onclick="toggleReviewText(' + i + ')" id="show-more-btn-' + i + '">Vis mere</button>';
          }
          html += '</div>';

          if (review.images && review.images.length > 0) {
            html += '<div class="review-images">';
            for (var j = 0; j < Math.min(3, review.images.length); j++) {
              html += '<img src="' + review.images[j].thumbnail + '" alt="Anmeldelsesbillede" class="review-image" />';
            }
            html += '</div>';
          }

          // Owner Response
          if (review.owner_response && review.owner_response.text) {
            var responseText = review.owner_response.text;
            var shouldTruncateResponse = responseText.length > 70;
            
            html += '<div class="owner-response">';
            html += '<div class="owner-response-header">';
            html += messageIconSVG;
            html += '<span class="owner-response-title">Svar fra ejeren</span>';
            html += '</div>';
            
            if (review.owner_response.date) {
              html += '<span class="owner-response-date">' + escapeHtml(review.owner_response.date) + '</span>';
            }
            
            html += '<p class="owner-response-text' + (shouldTruncateResponse ? ' truncated' : '') + '" id="owner-response-text-' + i + '">' + escapeHtml(responseText) + '</p>';
            
            if (shouldTruncateResponse) {
              html += '<button class="show-more-btn" onclick="toggleOwnerResponse(' + i + ')" id="show-more-response-btn-' + i + '">Vis mere</button>';
            }
            
            html += '</div>';
          }

          if (review.likes && review.likes > 0) {
            var likesText = review.likes === 1 ? 'person fandt' : 'personer fandt';
            html += '<div class="likes">' + review.likes + ' ' + likesText + ' dette nyttigt</div>';
          }

          html += '</div>';
        }

        html += '</div>';
        return html;
      }

      function toggleReviewText(index) {
        var textElement = document.getElementById('review-text-' + index);
        var buttonElement = document.getElementById('show-more-btn-' + index);
        
        if (textElement && buttonElement) {
          if (textElement.classList.contains('truncated')) {
            textElement.classList.remove('truncated');
            buttonElement.textContent = 'Vis mindre';
            expandedReviews[index] = true;
          } else {
            textElement.classList.add('truncated');
            buttonElement.textContent = 'Vis mere';
            expandedReviews[index] = false;
          }
        }
      }

      function toggleOwnerResponse(index) {
        var textElement = document.getElementById('owner-response-text-' + index);
        var buttonElement = document.getElementById('show-more-response-btn-' + index);
        
        if (textElement && buttonElement) {
          if (textElement.classList.contains('truncated')) {
            textElement.classList.remove('truncated');
            buttonElement.textContent = 'Vis mindre';
            expandedResponses[index] = true;
          } else {
            textElement.classList.add('truncated');
            buttonElement.textContent = 'Vis mere';
            expandedResponses[index] = false;
          }
        }
      }

      window.toggleReviewText = toggleReviewText;
      window.toggleOwnerResponse = toggleOwnerResponse;

      function fetchReviews() {
        return fetch(SUPABASE_URL + '/functions/v1/fetch-reviews?place_id=' + PLACE_ID, {
          headers: {
            'Authorization': 'Bearer ' + SUPABASE_KEY
          }
        })
        .then(function(response) {
          if (!response.ok) {
            throw new Error('Kunne ikke hente anmeldelser: ' + response.statusText);
          }
          return response.json();
        })
        .then(function(data) {
          if (data.reviews && data.reviews.length > 0) {
            localStorage.setItem(STORAGE_KEY, JSON.stringify(data.reviews));
            
            if (data.rating) {
              localStorage.setItem(RATING_KEY, data.rating.toString());
            }
            
            var nextMidnight = new Date();
            nextMidnight.setDate(nextMidnight.getDate() + 1);
            nextMidnight.setHours(0, 0, 0, 0);
            
            localStorage.setItem(EXPIRES_AT_KEY, nextMidnight.toISOString());
            
            return { reviews: data.reviews, rating: data.rating };
          } else {
            throw new Error('Ingen anmeldelser fundet');
          }
        })
        .catch(function(error) {
          console.error('Fejl ved hentning af anmeldelser:', error);
          throw error;
        });
      }

      function loadReviews(forceRefresh) {
        var container = document.getElementById('reviews-container');

        var cachedReviews = localStorage.getItem(STORAGE_KEY);
        var cachedRating = localStorage.getItem(RATING_KEY);

        if (cachedReviews && !shouldFetchReviews() && !forceRefresh) {
          var reviews = JSON.parse(cachedReviews);
          var rating = cachedRating || '0.0';
          updateHeader(rating, reviews.length);
          container.innerHTML = renderReviews(reviews);
          attachGoogleIconListeners();
          
          // Debug: Log owner responses
          console.log('Reviews loaded from cache. Checking owner responses...');
          reviews.forEach(function(review, idx) {
            if (review.owner_response && review.owner_response.text) {
              console.log('Review ' + idx + ' has owner response:', review.owner_response.text.length + ' chars');
            }
          });
          
          scheduleNextUpdate();
        } else {
          fetchReviews()
            .then(function(data) {
              var rating = data.rating || '0.0';
              updateHeader(rating, data.reviews.length);
              container.innerHTML = renderReviews(data.reviews);
              attachGoogleIconListeners();
              
              // Debug: Log owner responses
              console.log('Reviews loaded from API. Checking owner responses...');
              data.reviews.forEach(function(review, idx) {
                if (review.owner_response && review.owner_response.text) {
                  console.log('Review ' + idx + ' has owner response:', review.owner_response.text.length + ' chars');
                }
              });
              
              scheduleNextUpdate();
            })
            .catch(function(error) {
              console.error('Fejl ved indlæsning af anmeldelser:', error);
              container.innerHTML = '<div class="error">Kunne ikke indlæse anmeldelser. Prøv igen senere.</div>';
            });
        }
      }

      function attachGoogleIconListeners() {
        var googleIcons = document.querySelectorAll('.google-icon');
        for (var i = 0; i < googleIcons.length; i++) {
          googleIcons[i].addEventListener('click', function() {
            var reviewLink = this.getAttribute('data-review-link');
            if (reviewLink && reviewLink.trim() !== '') {
              window.open(reviewLink, '_blank', 'noopener,noreferrer');
            } else {
              window.open('https://search.google.com/local/writereview?placeid=' + PLACE_ID, '_blank', 'noopener,noreferrer');
            }
          });
        }
      }

      function scheduleNextUpdate() {
        if (refreshTimeout) {
          clearTimeout(refreshTimeout);
          refreshTimeout = null;
        }

        var expiresAt = localStorage.getItem(EXPIRES_AT_KEY);
        
        if (!expiresAt) return;

        var expirationDate = new Date(expiresAt);
        var now = new Date();
        var timeUntilExpiration = expirationDate - now;

        if (timeUntilExpiration > 0) {
          var bufferTime = 10000;
          var scheduleTime = timeUntilExpiration + bufferTime;
          
          refreshTimeout = setTimeout(function() {
            loadReviews(true);
          }, scheduleTime);
        } else {
          loadReviews(true);
        }
      }

      function handleVisibilityChange() {
        if (!document.hidden && shouldFetchReviews()) {
          loadReviews(true);
        }
      }

      function handleWindowFocus() {
        if (shouldFetchReviews()) {
          loadReviews(true);
        }
      }

      function handleBeforeUnload() {
        if (refreshTimeout) {
          clearTimeout(refreshTimeout);
          refreshTimeout = null;
        }
      }

      loadReviews(false);

      document.addEventListener('visibilitychange', handleVisibilityChange);
      window.addEventListener('focus', handleWindowFocus);
      window.addEventListener('beforeunload', handleBeforeUnload);

          // ===== ADD HEIGHT REPORTER HERE =====
      function sendHeightToParent() {
        var height = document.body.scrollHeight;
        window.parent.postMessage({ height: height }, '*');
      }

      window.addEventListener('load', function() {
        sendHeightToParent();
      });

      if (window.ResizeObserver) {
        var resizeObserver = new ResizeObserver(function() {
          sendHeightToParent();
        });
        resizeObserver.observe(document.body);
      }

      if (window.MutationObserver) {
        var mutationObserver = new MutationObserver(function() {
          sendHeightToParent();
        });
        mutationObserver.observe(document.body, {
          childList: true,
          subtree: true,
          attributes: true,
          characterData: true
        });
      }

      setInterval(sendHeightToParent, 1000);
      setTimeout(sendHeightToParent, 100);
      setTimeout(sendHeightToParent, 500);
